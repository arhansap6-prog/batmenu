name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
with:with:
  node-version: 22with:
  node-version: 22
  node-version: 22        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4  with:
    node-version: 22
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          non:   with:
    node-version: 22
      - name: Install dependencies
with:
  node-version: 22
        run: npm install

      - name: Build web
        run: npm run  with:
    node-version: 22 build

      - name: Setup Android
        run: |  with:
    node-version: 22
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

