name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node (for Capacitor CLI, even though we use live URL mode) ────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # ── 4. Decode keystore from secret ───────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/batmenu.keystore

      # ── 5. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 6. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        env:
          KEYSTORE_PATH: app/batmenu.keystore
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Rename APK with version + commit sha ───────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/batmenu-debug-${{ github.run_number }}-${{ github.sha }}.apk

      # ── 8. Upload as Actions artifact (always available) ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: batmenu-apk-${{ github.run_number }}
          path: artifacts/*.apk
          retention-days: 30

      # ── 9. Create/update GitHub Release and attach APK ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "BAT MENU — Build #${{ github.run_number }}"
          body: |
            ## BAT MENU Android APK

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Install on Android
            1. Download the `.apk` file below
            2. On your Android phone, open **Settings → Security → Install unknown apps** and allow your browser
            3. Tap the downloaded APK to install

            > This is a signed debug build pointing to https://batmenu.lovable.app
          files: artifacts/*.apk
          draft: false
          prerelease: false
